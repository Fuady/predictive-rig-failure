version: "3.9"

services:

  # ── MLflow tracking server ────────────────────────────────────────────────
  mlflow:
    image: python:3.10-slim
    working_dir: /mlflow
    command: >
      bash -c "pip install mlflow -q &&
               mlflow server
               --backend-store-uri sqlite:///mlflow.db
               --default-artifact-root /mlflow/artifacts
               --host 0.0.0.0 --port 5000"
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Inference API ─────────────────────────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    ports:
      - "8000:8000"
    volumes:
      - ../models:/app/models
      - ../data/features:/app/data/features
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - PYTHONPATH=/app
    depends_on:
      - mlflow
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # ── Engineer dashboard ────────────────────────────────────────────────────
  dashboard:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dashboard
    ports:
      - "8501:8501"
    environment:
      - API_BASE_URL=http://api:8000
      - PYTHONPATH=/app
    depends_on:
      - api
    restart: unless-stopped

volumes:
  mlflow_data:
